---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kioku-frontend-deployment
  labels:
    app: kioku-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kioku-frontend
  template:
    metadata:
      labels:
        app: kioku-frontend
    spec:
      containers:
      - name: kioku-frontend
        image: ghcr.io/kioku-project/kioku_frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
          - name: NEXT_PUBLIC_ENVIRONMENT
            value: production

---
apiVersion: v1
kind: Service
metadata:
  name: kioku-frontend-service
spec:
  selector:
    app: kioku-frontend
  ports:
    - port: 8082
      targetPort: 3000
  type: LoadBalancer