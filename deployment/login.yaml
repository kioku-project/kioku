---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kioku-login-deployment
  labels:
    app: kioku-login
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kioku-login
  template:
    metadata:
      labels:
        app: kioku-login
    spec:
      containers:
      - name: kioku-login
        image: ghcr.io/kioku-project/kioku_login
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: POSTGRESS_USER
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: user
        - name: POSTGRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: password
        - name: POSTGRESS_DB
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: name

---
apiVersion: v1
kind: Service
metadata:
  name: kioku-login-service
spec:
  selector:
    app: kioku-login
  ports:
    - port: 8084
      targetPort: 3001
  type: LoadBalancer