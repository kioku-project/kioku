---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kioku-login-deployment
  labels:
    app: kioku-login
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kioku-login
  template:
    metadata:
      labels:
        app: kioku-login
    spec:
      containers:
      - name: kioku-backend
        image: ghcr.io/kioku-project/kioku_login
        imagePullPolicy: Always
        ports:
        - containerPort: 3001

---
apiVersion: v1
kind: Service
metadata:
  name: kioku-login-service
spec:
  selector:
    app: kioku-login
  ports:
    - port: 8084
      targetPort: 3001
  type: LoadBalancer